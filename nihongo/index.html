<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Form Preview and Copy</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Custom styles for rounded corners as Tailwind classes are on elements */
        input[type="text"], input[type="date"], textarea, select {
            border-radius: 0.5rem; /* rounded-lg equivalent */
        }
        button {
            border-radius: 0.5rem; /* rounded-lg equivalent */
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100 font-sans text-gray-800 p-4">

    <div class="max-w-7xl mx-auto bg-white shadow-xl rounded-xl overflow-hidden md:flex">
        <!-- Left Pane: Input Form -->
        <div class="md:w-1/2 p-6 md:p-8 border-r border-gray-200">
            <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">
                Japanese Form Preview and Copy
            </h2>

            <div class="space-y-4">
                <!-- Japanese Text Input -->
                <div>
                    <label for="japanese-text" class="block text-sm font-medium text-gray-700 mb-1">
                        Japanese Text
                    </label>
                    <input
                        type="text"
                        id="japanese-text"
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                        placeholder="Enter Japanese text"
                    >
                </div>

                <!-- Romaji Text Input -->
                <div>
                    <label for="romaji-text" class="block text-sm font-medium text-gray-700 mb-1">
                        Romaji Text
                    </label>
                    <input
                        type="text"
                        id="romaji-text"
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                        placeholder="Enter romaji text"
                    >
                </div>

                <!-- Thai Text Input -->
                <div>
                    <label for="thai-text" class="block text-sm font-medium text-gray-700 mb-1">
                        Thai Text
                    </label>
                    <input
                        type="text"
                        id="thai-text"
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                        placeholder="Enter Thai text"
                    >
                </div>

                <!-- Hiragana Input -->
                <div>
                    <label for="hiragana" class="block text-sm font-medium text-gray-700 mb-1">
                        Hiragana
                    </label>
                    <input
                        type="text"
                        id="hiragana"
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                        placeholder="Enter hiragana"
                    >
                </div>

                <!-- Description Textarea -->
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
                        Description
                    </label>
                    <textarea
                        id="description"
                        rows="3"
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                        placeholder="Enter description"
                    ></textarea>
                </div>

                <!-- Game Title Input -->
                <div>
                    <label for="gametitle" class="block text-sm font-medium text-gray-700 mb-1">
                        Game Title
                    </label>
                    <input
                        type="text"
                        id="gametitle"
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                        placeholder="Enter game title"
                    >
                </div>

                <!-- Word Types Multi-Select -->
                <div>
                    <label for="word-types" class="block text-sm font-medium text-gray-700 mb-1">
                        Word Types (select multiple)
                    </label>
                    <select
                        id="word-types"
                        multiple
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm h-32"
                    >
                        <option value="คำนาม">คำนาม</option>
                        <option value="คำคุณศัพท์ な">คำคุณศัพท์ な</option>
                        <option value="คำคุณศัพท์ い">คำคุณศัพท์ い</option>
                        <option value="คำกริยากลุ่ม 1">คำกริยากลุ่ม 1</option>
                        <option value="คำกริยากลุ่ม 2">คำกริยากลุ่ม 2</option>
                        <option value="คำกริยากลุ่ม 3 (する)">คำกริยากลุ่ม 3 (する)</option>
                        <option value="สกรรมกริยา (他動詞)">สกรรมกริยา (他動詞)</option>
                        <option value="อกรรมกริยา (自動詞)">อกรรมกริยา (自動詞)</option>
                        <option value="คำวิเศษณ์">คำวิเศษณ์</option>
                        <option value="คำขยายคำหลัก (連体詞)">คำขยายคำหลัก (連体詞)</option>
                    </select>
                </div>

                <!-- N Level Select -->
                <div>
                    <label for="n-level" class="block text-sm font-medium text-gray-700 mb-1">
                        คำศัพท์ระดับ
                    </label>
                    <select
                        id="n-level"
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                    >
                        <option value="None">None</option>
                        <option value="N1">N1</option>
                        <option value="N2">N2</option>
                        <option value="N3">N3</option>
                    </select>
                </div>

                <!-- JLPT Exam Checkbox -->
                <div class="flex items-center">
                    <input
                        type="checkbox"
                        id="jlpt-exam"
                        class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                    >
                    <label for="jlpt-exam" class="ml-2 block text-sm font-medium text-gray-700">
                        ออกสอบ JLPT
                    </label>
                </div>

                <!-- JLPT Level Select -->
                <div>
                    <label for="jlpt-level" class="block text-sm font-medium text-gray-700 mb-1">
                        JLPT Level
                    </label>
                    <select
                        id="jlpt-level"
                        disabled
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                    >
                        <option value="N1">N1</option>
                        <option value="N2">N2</option>
                        <option value="N3">N3</option>
                    </select>
                </div>

                <!-- Year and Month Inputs -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="year" class="block text-sm font-medium text-gray-700 mb-1">
                            Year
                        </label>
                        <input
                            type="text"
                            id="year"
                            disabled
                            class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                        >
                    </div>
                    <div>
                        <label for="month" class="block text-sm font-medium text-gray-700 mb-1">
                            Month
                        </label>
                        <input
                            type="text"
                            id="month"
                            disabled
                            class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                        >
                    </div>
                </div>

                <!-- J.TEST Exam Checkbox -->
                <div class="flex items-center">
                    <input
                        type="checkbox"
                        id="jtest-exam"
                        class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
                    >
                    <label for="jtest-exam" class="ml-2 block text-sm font-medium text-gray-700">
                        ออกสอบ J.TEST
                    </label>
                </div>

                <!-- J.TEST Number Input -->
                <div>
                    <label for="jtest-no" class="block text-sm font-medium text-gray-700 mb-1">
                        J.TEST No
                    </label>
                    <input
                        type="text"
                        id="jtest-no"
                        disabled
                        class="w-full p-3 border border-gray-300 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                    >
                </div>
            </div>
        </div>

        <!-- Right Pane: Preview -->
        <div class="md:w-1/2 p-6 md:p-8 bg-gray-50 flex flex-col">
            <h2 class="text-3xl font-bold text-gray-900 mb-6 text-center">
                Preview
            </h2>
            <div id="preview" class="flex-grow bg-gray-800 text-gray-50 p-4 rounded-lg overflow-auto text-sm leading-relaxed whitespace-pre-wrap">
【คำศัพท์】


※ คำนาม / คำกริยากลุ่ม 3 (する) / สกรรมกริยา (他動詞) / อกรรมกริยา (自動詞)
※ คำศัพท์ระดับ N1

————————————
() หมายถึง

————————————
▍ภาพจากเกม 
            </div>
            <button
                id="copyButton"
                class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 transition duration-300 ease-in-out shadow-md"
            >
                Copy
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Get all form elements
            const japaneseTextInput = document.getElementById('japanese-text');
            const romajiTextInput = document.getElementById('romaji-text');
            const thaiTextInput = document.getElementById('thai-text');
            const hiraganaInput = document.getElementById('hiragana');
            const descriptionInput = document.getElementById('description');
            const gameTitleInput = document.getElementById('gametitle');
            const previewOutput = document.getElementById('preview');
            const copyButton = document.getElementById('copyButton');
            const nLevelSelect = document.getElementById('n-level');
            const jlptLevelSelect = document.getElementById('jlpt-level');
            const yearInput = document.getElementById('year');
            const monthInput = document.getElementById('month');
            const jlptExamCheckbox = document.getElementById('jlpt-exam');
            const jtestExamCheckbox = document.getElementById('jtest-exam');
            const jtestNoInput = document.getElementById('jtest-no');

            // Initialize Tom Select for word types
            const wordTypesSelect = new TomSelect('#word-types', {
                plugins: ['remove_button', 'clear_button'],
                maxItems: null,
                persist: false,
                create: false,
                onChange: updatePreview,
                render: {
                    item: function(data, escape) {
                        return '<div class="inline-flex items-center bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded mr-1 mb-1">' + 
                               escape(data.text) + 
                               '</div>';
                    },
                    option: function(data, escape) {
                        return '<div class="p-1 hover:bg-gray-100">' + escape(data.text) + '</div>';
                    }
                }
            });

            // Set current year and month
            const today = new Date();
            yearInput.value = today.getFullYear();
            monthInput.value = String(today.getMonth() + 1).padStart(2, '0');

            // Update preview when any input changes
            const updatePreview = () => {
                const japaneseText = japaneseTextInput.value;
                const romajiText = romajiTextInput.value;
                const thaiText = thaiTextInput.value;
                const hiragana = hiraganaInput.value;
                const description = descriptionInput.value;
                const gameTitle = gameTitleInput.value;
                const nLevel = nLevelSelect.value;
                const selectedWordTypes = wordTypesSelect.items
                    .map(value => wordTypesSelect.options[value].text)
                    .join(' / ');
                
                let output = `【คำศัพท์】\n\n${japaneseText}\n${romajiText}\n${thaiText}\n\n※ ${selectedWordTypes}`;

                if (nLevel !== "None") {
                    output += `\n※ คำศัพท์ระดับ ${nLevel}`;
                }

                if (jlptExamCheckbox.checked) {
                    const jlptLevel = jlptLevelSelect.value;
                    output += `\nออกสอบ JLPT ${jlptLevel} (รอบ ${yearInput.value}年${monthInput.value}月)`;
                }

                if (jtestExamCheckbox.checked && jtestNoInput.value) {
                    output += `\nออกสอบ J.TEST ระดับ A-C (第${jtestNoInput.value}回)`;
                }

                output += `\n\n————————————\n${japaneseText} (${hiragana}) หมายถึง\n${description}\n\n————————————\n▍ภาพจากเกม ${gameTitle}`;

                previewOutput.textContent = output;
            };

            // Handle JLPT exam checkbox change
            jlptExamCheckbox.addEventListener('change', function() {
                jlptLevelSelect.disabled = !this.checked;
                yearInput.disabled = !this.checked;
                monthInput.disabled = !this.checked;
                updatePreview();
            });

            // Handle J.TEST exam checkbox change
            jtestExamCheckbox.addEventListener('change', function() {
                jtestNoInput.disabled = !this.checked;
                updatePreview();
            });

            // Set up event listeners for all inputs
            [
                japaneseTextInput, romajiTextInput, thaiTextInput, hiraganaInput,
                descriptionInput, gameTitleInput, nLevelSelect, jlptLevelSelect,
                yearInput, monthInput, jtestNoInput
            ].forEach(input => {
                input.addEventListener('input', updatePreview);
            });

            // Handle copy button click
            copyButton.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(previewOutput.textContent);
                    
                    // Show success message
                    const originalText = copyButton.textContent;
                    copyButton.textContent = 'Copied!';
                    copyButton.classList.remove('bg-blue-600', 'hover:bg-blue-700');
                    copyButton.classList.add('bg-green-600', 'hover:bg-green-700');
                    
                    // Reset button after 2 seconds
                    setTimeout(() => {
                        copyButton.textContent = originalText;
                        copyButton.classList.remove('bg-green-600', 'hover:bg-green-700');
                        copyButton.classList.add('bg-blue-600', 'hover:bg-blue-700');
                    }, 2000);
                } catch (err) {
                    console.error('Failed to copy text: ', err);
                    alert('Failed to copy text to clipboard');
                }
            });

            // Initialize the preview
            updatePreview();
        });
    </script>

</body>

</html>
