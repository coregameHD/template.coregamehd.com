<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kagami Templates</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font import */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8; /* Light gray background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ensure it takes full viewport height */
            margin: 0;
        }
    </style>
</head>
<body class="antialiased">
    <div class="container mx-auto p-4 sm:p-6 lg:p-8 bg-white shadow-xl rounded-xl max-w-md w-full border border-gray-200">
        <!-- Website Title -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-gray-900 leading-tight">
                Kagami Templates
            </h1>
            <p class="mt-2 text-lg text-gray-600">Explore different facets of Kagami's world.</p>
        </header>

        <!-- Navigation Buttons -->
        <nav class="space-y-4">
            <a href="/visualnovel" class="block">
                <button class="w-full bg-[#FF6040] hover:bg-[#E05030] text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-[#FF6040] focus:ring-opacity-75 text-xl">
                    Kagami Visual Novel
                </button>
            </a>
            <a href="/nihongo" class="block">
                <button class="w-full bg-[#FF4081] hover:bg-[#E03071] text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-[#FF4081] focus:ring-opacity-75 text-xl">
                    Kagami Nihongo
                </button>
            </a>
            <a href="/blog" class="block">
                <button class="w-full bg-[#5C2D82] hover:bg-[#4C246A] text-white font-semibold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-[#5C2D82] focus:ring-opacity-75 text-xl">
                    Kagami Blog
                </button>
            </a>
        </nav>
    </div>
</body>
</html>
